;
; RTP Configuration
;
[general]
;
; RTP start and RTP end configure start and end addresses
;
; Defaults are rtpstart=5000 and rtpend=31000
;

rtpstart={{ rtp_min_port }}
rtpend={{ rtp_max_port }}

icesupport=true

[ice_host_candidates]

{{ private_ip }} => {{ public_ip }}
; Hide production Docker's bridge network
172.17.0.1 => {{ public_ip }}
