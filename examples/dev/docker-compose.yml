volumes:
  asterisk_logs:

services:
  asterisk:
    image: ghcr.io/andrius/asterisk:20.18.2_debian-trixie
    ports:
      - "5060:5060/udp" # SIP UDP
      - "5060:5060/tcp" # SIP TCP
      - "5061:5061/tcp" # SIP TLS
      - "10000-10199:10000-10199/udp" # RTP Media (ensure these ports are open in firewall)
    volumes:
      - asterisk_logs:/var/log/asterisk
      # - ./asterisk/keys:/etc/asterisk/keys:ro
      - ./asterisk/config/modules.conf:/etc/asterisk/modules.conf:ro
      - ./asterisk/config/logger.conf:/etc/asterisk/logger.conf:ro
    # env_file: .env
    restart: unless-stopped
